<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- PK:HEAD -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.clarity.ms; worker-src 'self' blob:; connect-src 'self' http://localhost:* https://printkaro-b9r0.onrender.com https: wss:; manifest-src 'self'"
    />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://printkaro.app/pay.html" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08090c" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta property="og:site_name" content="Print Karo" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Payment — Print Karo" />
    <meta property="og:description" content="Securely pay for your print." />
    <meta property="og:url" content="https://printkaro.app/pay.html" />
    <meta property="og:image" content="https://printkaro.app/assets/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Payment — Print Karo" />
    <meta name="twitter:description" content="Securely pay for your print." />
    <meta name="twitter:image" content="https://printkaro.app/assets/icons/icon-512.png" />
    <!-- /PK:HEAD -->
    <title>Payment — Print Karo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script>
      document.documentElement.setAttribute(
        'data-theme',
        localStorage.getItem('pk_theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
      );
    </script>
  </head>
  <body>
    <header id="nav"></header>
    <main class="app-main">
      <div class="app-narrow container">
        <div class="stepper" id="stepper"></div>

        <!-- Machine picker (shown only if no machine chosen yet) -->
        <div class="card hidden" id="machine-picker" style="margin-bottom: 20px">
          <div class="field">
            <label class="label" for="pay-machine">Choose a machine</label>
            <select class="select" id="pay-machine"></select>
          </div>
          <button class="btn btn-primary btn-block" id="confirm-machine" style="margin-top: 12px">
            Confirm machine
          </button>
        </div>

        <!-- Loading -->
        <div id="pay-loading" class="card stack">
          <div class="skeleton sk-line" style="width: 40%"></div>
          <div class="skeleton sk-block"></div>
          <div class="skeleton sk-line" style="width: 60%"></div>
        </div>

        <!-- Payment -->
        <div id="pay-body" class="hidden">
          <div class="card" style="text-align: center">
            <span class="badge badge-brand" style="margin-bottom: 12px">Demo payment</span>
            <div class="text-muted" style="font-size: var(--fs-sm)">Amount due</div>
            <div class="price-big" id="pay-amount">₹0.00</div>
            <div class="text-muted" style="font-size: var(--fs-sm); margin-top: 4px" id="pay-order">
              —
            </div>

            <div class="pay-options" style="margin-top: 24px">
              <button class="btn btn-primary btn-lg btn-block" id="pay-now">
                Pay
                <svg
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M20 6 9 17l-5-5" />
                </svg>
              </button>
            </div>
            <p class="text-muted" style="font-size: var(--fs-xs); margin-top: 16px">
              Demo gateway — no card required. Your PIN is generated the moment payment is
              confirmed.
            </p>
          </div>
          <div id="pay-error" style="margin-top: 16px"></div>
        </div>

        <div id="pay-fatal" class="hidden"></div>
      </div>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="assets/js/payment.js"></script>
    <!-- PK:BOOT -->
    <script type="module">
      import { initPWA } from './assets/js/sw-register.js';
      import { initAnalytics } from './assets/js/analytics.js';
      initPWA();
      initAnalytics();
    </script>
    <!-- /PK:BOOT -->
  </body>
</html>

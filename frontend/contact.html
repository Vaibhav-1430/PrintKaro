    <title>Contact — Print Karo</title>
    <meta name="description" content="Get in touch to bring Print Karo to your campus." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script>
      document.documentElement.setAttribute(
        'data-theme',
        localStorage.getItem('pk_theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
      );
    </script>
  </head>
  <body data-active="">
    <header id="nav"></header>
    <main class="app-main">
      <div class="app-narrow container">
        <div class="text-center" style="margin-bottom: 28px">
          <span class="eyebrow">Contact</span>
          <h1 style="font-size: var(--fs-2xl)">Let's bring Print Karo to your campus</h1>
          <p>Operators, clubs and student bodies — tell us what you need.</p>
        </div>
        <div class="card">
          <form id="contact-form" class="stack" novalidate>
            <div class="field">
              <label class="label" for="c-name">Name</label
              ><input class="input" id="c-name" required />
            </div>
            <div class="field">
              <label class="label" for="c-email">Email</label
              ><input class="input" id="c-email" type="email" required />
            </div>
            <div class="field">
              <label class="label" for="c-msg">Message</label
              ><textarea class="textarea" id="c-msg" rows="4" required></textarea>
            </div>
            <div id="c-status"></div>
            <button class="btn btn-primary btn-lg" type="submit">Send message</button>
          </form>
        </div>
        <p class="text-muted text-center" style="margin-top: 20px; font-size: var(--fs-sm)">
          Or email us at
          <a href="mailto:hello@printkaro.app" style="color: var(--brand-500)"
            >hello@printkaro.app</a
          >
        </p>
      </div>
    </main>
    <footer id="footer"></footer>
    <script type="module">
      import { mountChrome } from './assets/js/partials.js';
      import { initAnimations } from './assets/js/animations.js';
      import { initRipples, toast } from './assets/js/ui.js';
      import { $ } from './assets/js/utils.js';
      (async () => {
        await mountChrome();
        initRipples();
        initAnimations();
        $('#contact-form').addEventListener('submit', (e) => {
          e.preventDefault();
          if (!$('#c-name').value || !$('#c-email').value || !$('#c-msg').value) {
            $('#c-status').innerHTML = '<div class="field-error">Please fill in all fields.</div>';
            return;
          }
          $('#c-status').innerHTML =
            '<div class="badge badge-success" style="padding:10px 14px">Thanks! We\'ll be in touch within a day.</div>';
          toast('Message sent', 'success');
          e.target.reset();
        });
      })();
    </script>
    <!-- PK:BOOT -->
    <script type="module">
      import { initPWA } from './assets/js/sw-register.js';
      import { initAnalytics } from './assets/js/analytics.js';
      initPWA();
      initAnalytics();
    </script>
    <!-- /PK:BOOT -->
  </body>
</html>

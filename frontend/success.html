    <title>Payment successful — Print Karo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script>
      document.documentElement.setAttribute(
        'data-theme',
        localStorage.getItem('pk_theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
      );
    </script>
  </head>
  <body>
    <header id="nav"></header>
    <main class="app-main">
      <div class="app-narrow container">
        <div class="stepper" id="stepper"></div>

        <div class="card fade-in" id="success-card" style="text-align: center; padding: 40px 28px">
          <div class="success-ring">
            <svg
              width="44"
              height="44"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </div>
          <h1 style="font-size: var(--fs-2xl)">You're all set!</h1>
          <p>Your payment is confirmed. Use the PIN below at the machine to collect your print.</p>

          <div class="text-muted" style="font-size: var(--fs-sm); margin-top: 24px">
            Your one-time PIN
          </div>
          <div class="pin-display" id="pin-display" aria-live="polite"></div>

          <div class="between" style="justify-content: center; gap: 16px; margin-bottom: 8px">
            <span class="countdown" id="countdown">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="9" />
                <path d="M12 8v4l3 2" />
              </svg>
              <span id="countdown-text">—</span>
            </span>
            <button class="btn btn-outline" id="copy-pin">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="9" y="9" width="12" height="12" rx="2" />
                <path d="M5 15V5a2 2 0 0 1 2-2h10" />
              </svg>
              Copy PIN
            </button>
          </div>

          <div
            class="card"
            style="text-align: left; margin-top: 24px; background: var(--surface-2)"
          >
            <div class="between"><span class="text-muted">Order</span><b id="s-order">—</b></div>
            <div class="between" style="margin-top: 8px">
              <span class="text-muted">Machine</span><b id="s-machine">—</b>
            </div>
            <div class="between" style="margin-top: 8px">
              <span class="text-muted">Amount paid</span><b id="s-amount">—</b>
            </div>
          </div>

          <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px">
            <a class="btn btn-outline" href="dashboard.html">View dashboard</a>
            <a class="btn btn-primary" href="upload.html">Print another</a>
          </div>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="assets/js/success.js"></script>
    <!-- PK:BOOT -->
    <script type="module">
      import { initPWA } from './assets/js/sw-register.js';
      import { initAnalytics } from './assets/js/analytics.js';
      initPWA();
      initAnalytics();
    </script>
    <!-- /PK:BOOT -->
  </body>
</html>

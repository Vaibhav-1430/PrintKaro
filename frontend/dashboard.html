<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- PK:HEAD -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.clarity.ms; worker-src 'self' blob:; connect-src 'self' http://localhost:4000 https: wss:; manifest-src 'self'" />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://printkaro.app/dashboard.html" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08090c" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta property="og:site_name" content="Print Karo" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dashboard — Print Karo" />
    <meta property="og:description" content="Your prints, PINs and receipts." />
    <meta property="og:url" content="https://printkaro.app/dashboard.html" />
    <meta property="og:image" content="https://printkaro.app/assets/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dashboard — Print Karo" />
    <meta name="twitter:description" content="Your prints, PINs and receipts." />
    <meta name="twitter:image" content="https://printkaro.app/assets/icons/icon-512.png" />
    <!-- /PK:HEAD -->
    <title>Dashboard — Print Karo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script>
      document.documentElement.setAttribute('data-theme', localStorage.getItem('pk_theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    </script>
  </head>
  <body>
    <header id="nav"></header>
    <main class="app-main">
      <div class="container">
        <div class="between" style="margin-bottom: 24px; flex-wrap: wrap">
          <div>
            <h1 style="font-size: var(--fs-2xl)">Welcome back<span id="hi-name"></span></h1>
            <p class="text-muted">Your prints, PINs and receipts in one place.</p>
          </div>
          <a class="btn btn-primary" href="upload.html">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New print
          </a>
        </div>

        <div class="dash-grid">
          <!-- Left column: active order + history -->
          <div class="stack" style="gap: 20px">
            <div id="active-order"></div>

            <div class="card">
              <div class="tabs" id="tabs">
                <button class="tab active" data-tab="orders">Orders</button>
                <button class="tab" data-tab="pins">PIN history</button>
                <button class="tab" data-tab="files">Saved files</button>
                <button class="tab" data-tab="invoices">Invoices</button>
              </div>
              <div id="tab-content"></div>
            </div>
          </div>

          <!-- Right column: profile + tips -->
          <div class="stack" style="gap: 20px">
            <div class="card" id="profile-card"></div>
            <div class="card" style="background: var(--brand-gradient-soft); border-color: transparent">
              <h3 style="font-size: var(--fs-lg); margin-bottom: 6px">Collect at the machine</h3>
              <p style="font-size: var(--fs-sm)">Enter your PIN on the machine keypad. Your document
                prints silently and the PIN expires right after.</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="assets/js/dashboard.js"></script>
    <!-- PK:BOOT -->
    <script type="module">
      import { initPWA } from './assets/js/sw-register.js';
      import { initAnalytics } from './assets/js/analytics.js';
      initPWA();
      initAnalytics();
    </script>
    <!-- /PK:BOOT -->
  </body>
</html>

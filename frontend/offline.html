    <title>Offline — Print Karo</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script>
      document.documentElement.setAttribute(
        'data-theme',
        localStorage.getItem('pk_theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
      );
    </script>
  </head>
  <body>
    <main class="app-main center" style="min-height: 100vh; text-align: center">
      <div class="container" style="max-width: 460px">
        <div class="success-ring" style="background: var(--surface-2); color: var(--text-3)">
          <svg
            width="44"
            height="44"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"
            />
          </svg>
        </div>
        <h1 style="font-size: var(--fs-2xl)">You're offline</h1>
        <p style="margin: 12px 0 28px">
          Print Karo needs a connection to upload and print. Your saved pages are still available —
          reconnect to continue where you left off.
        </p>
        <div class="flex" style="gap: 12px; justify-content: center">
          <button class="btn btn-primary btn-lg" onclick="location.reload()">Try again</button>
          <a class="btn btn-outline btn-lg" href="index.html">Home</a>
        </div>
      </div>
    </main>
    <script>
      window.addEventListener('online', () => location.reload());
    </script>
    <!-- PK:BOOT -->
    <script type="module">
      import { initPWA } from './assets/js/sw-register.js';
      import { initAnalytics } from './assets/js/analytics.js';
      initPWA();
      initAnalytics();
    </script>
    <!-- /PK:BOOT -->
  </body>

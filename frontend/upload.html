<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.clarity.ms; worker-src 'self' blob:; connect-src 'self' https://printkaro-b9r0.onrender.com https: wss:; manifest-src 'self'"
    />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://printkaro.app/upload.html" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08090c" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta property="og:site_name" content="Print Karo" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Upload — Print Karo" />
    <meta property="og:description" content="Upload your document to print on campus." />
    <meta property="og:url" content="https://printkaro.app/upload.html" />
    <meta property="og:image" content="https://printkaro.app/assets/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Upload — Print Karo" />

    <!-- /PK:HEAD -->
    <title>Upload — Print Karo</title>
    <meta name="description" content="Upload your document to print on campus." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script>
      document.documentElement.setAttribute(
        'data-theme',
        localStorage.getItem('pk_theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
      );
    </script>
  </head>
  <body>
    <header id="nav"></header>
    <main class="app-main">
      <div class="app-narrow container">
        <div class="stepper" id="stepper"></div>

        <div class="stack" style="gap: 20px">
          <div class="text-center">
            <h1 style="font-size: var(--fs-2xl)">Upload your document</h1>
            <p>Drag &amp; drop or browse. PDF, Word, PowerPoint or images up to 100 MB.</p>
          </div>

          <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Upload files">
            <div class="dz-ic">
              <svg
                viewBox="0 0 24 24"
                width="30"
                height="30"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path d="M12 16V4M7 9l5-5 5 5M4 20h16" />
              </svg>
            </div>
            <div class="dz-title">Drop your files here</div>
            <div class="dz-sub">
              or <span style="color: var(--brand-500); font-weight: 600">browse files</span>
              <span class="text-muted"> · </span>
              <button
                type="button"
                data-folder
                style="
                  background: none;
                  border: none;
                  color: var(--brand-500);
                  font-weight: 600;
                  cursor: pointer;
                "
              >
                upload a folder
              </button>
            </div>
            <input
              type="file"
              id="file-input"
              class="sr-only"
              multiple
              accept=".pdf,.doc,.docx,.ppt,.pptx,.png,.jpg,.jpeg"
            />
            <input
              type="file"
              id="folder-input"
              class="sr-only"
              webkitdirectory
              directory
              multiple
            />
          </div>

          <div class="between" id="queue-bar" style="min-height: 4px">
            <span class="text-muted" id="queue-count" style="font-size: var(--fs-sm)"></span>
          </div>

          <div id="file-list" class="stack" style="gap: 12px"></div>

          <div id="upload-error"></div>

          <a class="btn btn-primary btn-lg btn-block hidden" id="continue-btn" href="#">
            Continue to print options
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </a>

          <p class="text-muted text-center" style="font-size: var(--fs-sm)">
            No account needed yet. You'll sign in with your phone right before payment.
          </p>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="assets/js/upload.js"></script>
    <!-- PK:BOOT -->
    <script type="module">
      import { initPWA } from './assets/js/sw-register.js';
      import { initAnalytics } from './assets/js/analytics.js';
      initPWA();
      initAnalytics();
    </script>
    <!-- /PK:BOOT -->
  </body>
</html>

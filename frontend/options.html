<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- PK:HEAD -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.clarity.ms; worker-src 'self' blob:; connect-src 'self' https://printkaro-b9r0.onrender.com https: wss:; manifest-src 'self'"
    />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://printkaro.app/options.html" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08090c" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta property="og:site_name" content="Print Karo" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Print options — Print Karo" />
    <meta
      property="og:description"
      content="Choose copies, colour and paper, and preview your document."
    />
    <meta property="og:url" content="https://printkaro.app/options.html" />
    <meta property="og:image" content="https://printkaro.app/assets/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Print options — Print Karo" />
    <meta
      name="twitter:description"
      content="Choose copies, colour and paper, and preview your document."
    />
    <meta name="twitter:image" content="https://printkaro.app/assets/icons/icon-512.png" />
    <!-- /PK:HEAD -->
    <title>Print options — Print Karo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/tokens.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/animations.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script>
      document.documentElement.setAttribute(
        'data-theme',
        localStorage.getItem('pk_theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
      );
    </script>
  </head>
  <body>
    <header id="nav"></header>
    <main class="app-main">
      <div class="app-wide container">
        <div class="stepper" id="stepper"></div>

        <div class="dash-grid">
          <!-- Left: options -->
          <div class="stack" style="gap: 20px">
            <div>
              <h1 style="font-size: var(--fs-2xl)">Print options</h1>
              <p id="file-hint" class="text-muted">—</p>
            </div>

            <!-- Document preview (pdf.js, lazy) -->
            <div class="card" id="preview-panel">
              <div class="between" style="margin-bottom: 12px">
                <b>Preview</b>
                <span class="badge badge-brand">Before you pay</span>
              </div>
              <div id="preview-body" class="preview-body">
                <div class="skeleton" style="height: 260px; border-radius: 12px"></div>
              </div>
            </div>

            <div id="doc-warnings" class="stack" style="gap: 8px"></div>

            <!-- Delete pages → pageRange -->
            <div class="card hidden" id="pages-panel">
              <div class="between" style="margin-bottom: 10px">
                <b>Pages</b>
                <span class="text-muted" id="pages-label" style="font-size: var(--fs-sm)">—</span>
              </div>
              <p class="text-muted" style="font-size: var(--fs-xs); margin-bottom: 10px">
                Tap a page to remove it from this print. At least one page is required.
              </p>
              <div
                id="page-chips"
                class="page-chips"
                role="group"
                aria-label="Pages to print"
              ></div>
            </div>

            <div class="card">
              <div class="field" style="margin-bottom: 8px">
                <label class="label" for="machine">Machine</label>
                <select class="select" id="machine"></select>
                <span class="field-error hidden" id="machine-note"></span>
              </div>

              <div class="opt-row">
                <div>
                  <div style="font-weight: 600">Copies</div>
                  <div class="text-muted" style="font-size: var(--fs-sm)">
                    How many sets to print
                  </div>
                </div>
                <div class="qty">
                  <button type="button" id="copies-dec" aria-label="Fewer copies">−</button>
                  <input id="copies" value="1" inputmode="numeric" aria-label="Copies" />
                  <button type="button" id="copies-inc" aria-label="More copies">+</button>
                </div>
              </div>

              <div class="opt-row">
                <div><div style="font-weight: 600">Colour</div></div>
                <div class="segment" role="group" aria-label="Colour">
                  <button type="button" data-color="BW" aria-pressed="true">B&amp;W</button>
                  <button type="button" data-color="COLOR" aria-pressed="false">Colour</button>
                </div>
              </div>

              <div class="opt-row">
                <div><div style="font-weight: 600">Paper size</div></div>
                <div class="segment" role="group" aria-label="Paper size">
                  <button type="button" data-paper="A4" aria-pressed="true">A4</button>
                  <button type="button" data-paper="A3" aria-pressed="false">A3</button>
                  <button type="button" data-paper="LEGAL" aria-pressed="false">Legal</button>
                </div>
              </div>

              <div class="opt-row">
                <div>
                  <div style="font-weight: 600">Double-sided</div>
                  <div class="text-muted" style="font-size: var(--fs-sm)">
                    Print on both sides (duplex)
                  </div>
                </div>
                <label class="checkbox"
                  ><input type="checkbox" id="duplex" /> <span>Duplex</span></label
                >
              </div>

              <div class="opt-row">
                <div><div style="font-weight: 600">Orientation</div></div>
                <div class="segment" role="group" aria-label="Orientation">
                  <button type="button" data-orient="portrait" aria-pressed="true">Portrait</button>
                  <button type="button" data-orient="landscape" aria-pressed="false">
                    Landscape
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Right: price summary -->
          <div class="card price-summary">
            <div class="text-muted" style="font-size: var(--fs-sm)">Estimated total</div>
            <div class="price-big" id="price">₹0.00</div>
            <div
              id="price-breakdown"
              class="stack"
              style="gap: 6px; margin: 16px 0; font-size: var(--fs-sm)"
            ></div>
            <div id="options-error"></div>
            <button class="btn btn-primary btn-lg btn-block" id="continue-btn">
              Continue to payment
            </button>
            <p class="text-muted text-center" style="font-size: var(--fs-xs); margin-top: 12px">
              You'll confirm your phone before paying.
            </p>
          </div>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="assets/js/options.js"></script>
    <!-- PK:BOOT -->
    <script type="module">
      import { initPWA } from './assets/js/sw-register.js';
      import { initAnalytics } from './assets/js/analytics.js';
      initPWA();
      initAnalytics();
    </script>
    <!-- /PK:BOOT -->
  </body>
</html>
